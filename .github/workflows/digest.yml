name: AI Builders Digest

on:
  # Run automatically every day at 7am Sydney 
  schedule:
    - cron: '0 21 * * *'

  # Allow manual trigger from Actions tab
  workflow_dispatch:
    inputs:
      delivery_override:
        description: 'Force delivery method (optional)'
        required: false
        type: choice
        options:
          - both
          - telegram
          - email
          - stdout

# Only one digest run at a time
concurrency:
  group: digest-${{ github.ref }}
  cancel-in-progress: false

jobs:
  digest:
    name: Generate & Deliver Digest
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ------------------------------------------------------------------
      # 1. Checkout
      # ------------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # 2. Setup Node.js
      # ------------------------------------------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scripts/package-lock.json

      # ------------------------------------------------------------------
      # 3. Install dependencies
      # ------------------------------------------------------------------
      - name: Install dependencies
        run: npm install
        working-directory: scripts

      # ------------------------------------------------------------------
      # 4. Run prepare-digest → save output
      # ------------------------------------------------------------------
      - name: Prepare digest data
        run: |
          node scripts/prepare-digest.js > prepare-output.json
        working-directory: scripts

      # ------------------------------------------------------------------
      # 5. Generate digest with OpenRouter LLM
      # ------------------------------------------------------------------
      - name: Generate digest with OpenRouter
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GITHUB_WORKSPACE: ${{ github.workspace }}
          DELIVERY_OVERRIDE: ${{ inputs.delivery_override || 'both' }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: |
          node scripts/generate-digest.mjs

      # ------------------------------------------------------------------
      # 6. Deliver via Telegram
      # ------------------------------------------------------------------
      - name: Deliver via Telegram
        if: |
          inputs.delivery_override != 'email' &&
          inputs.delivery_override != 'stdout' &&
          secrets.TELEGRAM_BOT_TOKEN != ''
        run: |
          node scripts/deliver-telegram.js /tmp/follow-builders-digest.md
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        continue-on-error: true

      # ------------------------------------------------------------------
      # 7. Deliver via Email
      # ------------------------------------------------------------------
      - name: Deliver via Email
        if: |
          inputs.delivery_override != 'telegram' &&
          inputs.delivery_override != 'stdout' &&
          secrets.RESEND_API_KEY != ''
        run: |
          node scripts/deliver-email.js /tmp/follow-builders-digest.md
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        continue-on-error: true

      # ------------------------------------------------------------------
      # 8. Upload digest as artifact (for review)
      # ------------------------------------------------------------------
      - name: Upload digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ github.run_number }}
          path: /tmp/follow-builders-digest.md
          retention-days: 7

      # ------------------------------------------------------------------
      # 9. Commit feed snapshot
      # ------------------------------------------------------------------
      - name: Commit feed snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp scripts/prepare-output.json feed-snapshot.json
          git add feed-snapshot.json
          git diff --cached --quiet || git commit -m "chore: feed snapshot $(date -u +%Y-%m-%dT%H:%M:%SZ) [skip ci]"
          git push
