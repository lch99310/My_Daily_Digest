name: AI Builders Digest

on:
  # Run automatically every day at 7am Sydney 
  schedule:
    - cron: '0 21 * * *'

  # Allow manual trigger from Actions tab
  workflow_dispatch:
    inputs:
      delivery_override:
        description: 'Force delivery method (optional)'
        required: false
        type: choice
        options:
          - both
          - telegram
          - email
          - stdout

# Only one digest run at a time
concurrency:
  group: digest-${{ github.ref }}
  cancel-in-progress: false

jobs:
  digest:
    name: Generate & Deliver Digest
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ------------------------------------------------------------------
      # 1. Checkout
      # ------------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # 2. Setup Node.js
      # ------------------------------------------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scripts/package-lock.json

      # ------------------------------------------------------------------
      # 3. Install dependencies
      # ------------------------------------------------------------------
      - name: Install dependencies
        run: npm install
        working-directory: scripts

      # ------------------------------------------------------------------
      # 4. Inject secrets as environment variables
      #    (GitHub Actions secrets → environment variables for scripts)
      # ------------------------------------------------------------------
      - name: Inject secrets
        run: |
          {
            echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}"
            echo "RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}"
            echo "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}"
          } >> "$GITHUB_ENV"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      # ------------------------------------------------------------------
      # 5. Inject config via environment variables
      # ------------------------------------------------------------------
      - name: Inject config
        run: |
          {
            echo "CONFIG_LANGUAGE=bilingual"
            echo "CONFIG_FREQUENCY=daily"
            echo "CONFIG_DELIVERY_METHOD=${{ inputs.delivery_override || 'both' }}"
            echo "CONFIG_DELIVERY_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}"
            echo "CONFIG_DELIVERY_EMAIL=${{ secrets.EMAIL_TO }}"
          } >> "$GITHUB_ENV"

      # ------------------------------------------------------------------
      # 6. Run prepare-digest → save output
      # ------------------------------------------------------------------
      - name: Prepare digest data
        id: prepare
        run: |
          node scripts/prepare-digest.js > prepare-output.json
          echo "json_file=prepare-output.json" >> "$GITHUB_OUTPUT"
        working-directory: scripts

      # ------------------------------------------------------------------
      # 7. Generate digest with Claude
      # ------------------------------------------------------------------
      - name: Generate digest with Claude
        id: generate
        env:
          DIGEST_JSON: ${{ github.workspace }}/scripts/prepare-output.json
        run: |
          # Read the JSON, then use Claude to generate the digest
          cat << 'CLAUDE_EOF' > /tmp/generate-digest.mjs
          import { readFile, writeFile } from 'fs/promises';
          import { readFileSync } from 'fs';
          import { execSync } from 'child_process';

          const jsonContent = await readFile(process.env.DIGEST_JSON, 'utf-8');
          const data = JSON.parse(jsonContent);

          const {
            language, frequency, delivery
          } = data.config;

          const podcasts = data.podcasts;
          const builders = data.x;
          const blogs = data.blogs;
          const stats = data.stats;

          const today = new Date().toLocaleDateString('en-US', {
            weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
          });

          // Build the prompt for the LLM
          const prompt = `You are writing the AI Builders Digest for ${today}.

FEED STATS:
- ${stats.podcastEpisodes} podcast episodes
- ${stats.xBuilders} X (Twitter) builders
- ${stats.totalTweets} tweets total
- ${stats.blogPosts} blog posts
- Feed last updated: ${stats.feedGeneratedAt || 'unknown'}

== PODCAST HIGHLIGHTS ==
${podcasts.slice(0, 5).map((p, i) => `${i+1}. **${p.name}** by ${p.author || 'Unknown'}
   ${(p.description || '').slice(0, 300)}
   ${p.url ? `🔗 ${p.url}` : ''}`).join('\n\n')}

== TOP X BUILDER UPDATES ==
${builders.slice(0, 8).map((b, i) => {
  const topTweet = (b.tweets || [])[0] || {};
  return `${i+1}. **@${b.handle}**${b.name ? ` (${b.name})` : ''}
   ${(topTweet.text || b.bio || '').slice(0, 280)}`;
}).join('\n\n')}

== NOTABLE BLOG POSTS ==
${blogs.slice(0, 3).map((b, i) => `${i+1}. **${b.title}**
   ${b.summary || ''}
   ${b.url ? `🔗 ${b.url}` : ''}`).join('\n\n')}

== YOUR TASK ==
Write a bilingual (Simplified Chinese + English) digest following the ${data.prompts?.digest_intro || ''}

Style rules:
- Language: **Simplified Chinese first**, then English translation
- Tone: warm, insightful, concise — like a smart friend sharing highlights
- Include emojis sparingly for visual anchors (🎙️ 🐦 📦 etc.)
- Use > for blockquotes, ** for bold
- Pick 3-5 of the most interesting/relevant items to highlight
- Do NOT list everything — curate and comment

Output format:
\`\`\`
# 🤖 AI Builders Digest — ${today}

## 🎙️ 播客焦點 / Podcast Spotlight
[content]

## 🐦 X / Twitter Highlights
[content]

## 📦 其他值得注意 / Other Notable Mentions
[content]

---
*Generated automatically · AI Builders Digest*
\`\`\`

Return ONLY the digest text, nothing else.`;

          // Call Claude via API
          const apiKey = process.env.ANTHROPIC_API_KEY;
          const response = await fetch('https://api.anthropic.com/v1/messages', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'x-api-key': apiKey,
              'anthropic-version': '2023-06-01',
              'anthropic-dangerous-direct-browser-access': 'true'
            },
            body: JSON.stringify({
              model: 'claude-sonnet-4-20250514',
              max_tokens: 4096,
              messages: [{ role: 'user', content: prompt }]
            })
          });

          if (!response.ok) {
            const err = await response.text();
            throw new Error(`Claude API error: ${response.status} ${err}`);
          }

          const result = await response.json();
          const digest = result.content?.[0]?.text || '';

          await writeFile('/tmp/follow-builders-digest.md', digest);
          console.log('Digest generated successfully');
          process.exit(0);
        CLAUDE_EOF

          node /tmp/generate-digest.mjs
        env:
          DIGEST_JSON: ${{ github.workspace }}/scripts/prepare-output.json
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      # ------------------------------------------------------------------
      # 8. Deliver via Telegram (if configured)
      # ------------------------------------------------------------------
      - name: Deliver via Telegram
        if: |
          inputs.delivery_override != 'email' &&
          inputs.delivery_override != 'stdout' &&
          secrets.TELEGRAM_BOT_TOKEN != ''
        run: |
          # Temporarily override config to telegram-only
          cp config.example.json config.tmp.json 2>/dev/null || echo '{}' > config.tmp.json
          python3 -c "
          import json
          cfg = json.load(open('config.tmp.json'))
          cfg['delivery'] = {'method': 'telegram', 'chatId': '${{ secrets.TELEGRAM_CHAT_ID }}'}
          json.dump(cfg, open('config.tmp.json', 'w'))
          "
          {
            echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}"
          } >> "$GITHUB_ENV"
          cat /tmp/follow-builders-digest.md | node scripts/deliver.js
        working-directory: scripts
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

      # ------------------------------------------------------------------
      # 9. Deliver via Email (if configured)
      # ------------------------------------------------------------------
      - name: Deliver via Email
        if: |
          inputs.delivery_override != 'telegram' &&
          inputs.delivery_override != 'stdout' &&
          secrets.RESEND_API_KEY != ''
        run: |
          python3 -c "
          import json
          cfg = json.load(open('config.tmp.json'))
          cfg['delivery'] = {'method': 'email', 'email': '${{ secrets.EMAIL_TO }}'}
          json.dump(cfg, open('config.tmp.json', 'w'))
          "
          {
            echo "RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}"
          } >> "$GITHUB_ENV"
          cat /tmp/follow-builders-digest.md | node scripts/deliver.js
        working-directory: scripts
        continue-on-error: true
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}

      # ------------------------------------------------------------------
      # 10. Save digest as artifact (for review)
      # ------------------------------------------------------------------
      - name: Upload digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ github.run_number }}
          path: /tmp/follow-builders-digest.md
          retention-days: 7

      # ------------------------------------------------------------------
      # 11. Commit prepare-output.json as feed snapshot
      # ------------------------------------------------------------------
      - name: Commit feed snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp scripts/prepare-output.json feed-snapshot.json
          git add feed-snapshot.json
          git diff --cached --quiet || git commit -m "chore: feed snapshot $(date -u +%Y-%m-%dT%H:%M:%SZ) [skip ci]"
          git push
