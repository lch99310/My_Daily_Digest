name: Daily Stock Fair-Price Digest

on:
  # Target Sydney 8am (AEST) next day after US market close (US Mon-Fri).
  # Cron uses UTC: 22:00 UTC Mon-Fri ≡ Sydney 08:00 AEST Tue-Sat.
  # GitHub Actions scheduled workflows can be delayed by several hours; the
  # 8am target buys a 5-hour buffer so the digest lands by lunchtime Sydney
  # even on a bad scheduler day. Cron Mon-Fri (US trading days).
  schedule:
    - cron: '0 22 * * 1-5'

  workflow_dispatch:

concurrency:
  group: stock-${{ github.ref }}
  cancel-in-progress: false

jobs:
  stock:
    name: Generate & Deliver Stock Fair-Price Digest
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate and deliver stock digest
        env:
          FINANCE_TELEGRAM_BOT_TOKEN:         ${{ secrets.FINANCE_TELEGRAM_BOT_TOKEN }}
          FINANCE_TELEGRAM_CHAT_ID:           ${{ secrets.FINANCE_TELEGRAM_CHAT_ID }}
          FINANCE_TELEGRAM_CHANNEL_CHAT_ID:   ${{ secrets.FINANCE_TELEGRAM_CHANNEL_CHAT_ID }}
          AGNES_AI_API_KEY:                   ${{ secrets.AGNES_AI_API_KEY }}
          DEEPSEEK_API_KEY:                   ${{ secrets.DEEPSEEK_API_KEY }}
          OPENROUTER_FREE_API_KEY:            ${{ secrets.OPENROUTER_FREE_API_KEY }}
        run: node scripts/stock-digest.mjs

      - name: Upload briefing artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stock-briefing-${{ github.run_number }}
          path: /tmp/stock-briefing.md
          retention-days: 7
