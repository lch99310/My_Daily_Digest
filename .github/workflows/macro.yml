name: Weekly Macro Indicators Digest

on:
  # Target Sydney Saturday 7am (AEST). Cron uses UTC: 21:00 UTC Fri ≡ Sydney
  # 07:00 AEST Sat. GitHub Actions scheduled workflows can be delayed several
  # hours; this buys buffer so the weekly macro lands by Sat noon Sydney.
  schedule:
    - cron: '0 21 * * 5'

  workflow_dispatch:

concurrency:
  group: macro-${{ github.ref }}
  cancel-in-progress: false

jobs:
  macro:
    name: Generate & Deliver Macro Indicators Digest
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate and deliver macro digest
        env:
          FRED_API_KEY:                       ${{ secrets.FRED_API_KEY }}
          FINANCE_TELEGRAM_BOT_TOKEN:         ${{ secrets.FINANCE_TELEGRAM_BOT_TOKEN }}
          FINANCE_TELEGRAM_CHAT_ID:           ${{ secrets.FINANCE_TELEGRAM_CHAT_ID }}
          FINANCE_TELEGRAM_CHANNEL_CHAT_ID:   ${{ secrets.FINANCE_TELEGRAM_CHANNEL_CHAT_ID }}
        run: node scripts/macro-digest.mjs

      - name: Upload briefing artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: macro-briefing-${{ github.run_number }}
          path: /tmp/macro-briefing.md
          retention-days: 7
