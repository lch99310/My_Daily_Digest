name: Monthly PEG Review

on:
  # Chains off Monthly Cache Refresh so the LLM judges PEG against fresh
  # fundamentals. Auto-runs only when cache-refresh succeeds; manual
  # dispatch still works for ad-hoc runs without re-refreshing cache.
  workflow_run:
    workflows: ["Monthly Cache Refresh"]
    types: [completed]
    branches: [main]

  workflow_dispatch:

# Allow committing config/stock-tickers.json back to the repo.
permissions:
  contents: write

concurrency:
  group: peg-review-${{ github.ref }}
  cancel-in-progress: false

jobs:
  peg-review:
    name: Run monthly PEG review + commit updates
    runs-on: ubuntu-latest
    # Only run if cache-refresh succeeded (or this is a manual dispatch).
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    timeout-minutes: 15

    steps:
      - name: Checkout latest main
        # workflow_run triggers carry the SHA from the cache-refresh
        # workflow's TRIGGERING commit, not from the auto-commit cache-refresh
        # itself pushed. Explicitly pull latest main so we read the freshly
        # updated cache values.
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run PEG review
        env:
          AGNES_AI_API_KEY:                   ${{ secrets.AGNES_AI_API_KEY }}
          DEEPSEEK_API_KEY:                   ${{ secrets.DEEPSEEK_API_KEY }}
          OPENROUTER_FREE_API_KEY:            ${{ secrets.OPENROUTER_FREE_API_KEY }}
          FINANCE_TELEGRAM_BOT_TOKEN:         ${{ secrets.FINANCE_TELEGRAM_BOT_TOKEN }}
          FINANCE_TELEGRAM_CHAT_ID:           ${{ secrets.FINANCE_TELEGRAM_CHAT_ID }}
          FINANCE_TELEGRAM_CHANNEL_CHAT_ID:   ${{ secrets.FINANCE_TELEGRAM_CHANNEL_CHAT_ID }}
        run: node scripts/peg-review.mjs

      - name: Commit PEG updates (if any)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain config/stock-tickers.json)" ]; then
            git add config/stock-tickers.json
            git commit -m "auto: monthly PEG review $(date -u +%Y-%m)"
            git push
            echo "PEG changes committed."
          else
            echo "No PEG changes this month — config unchanged."
          fi
